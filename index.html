<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raport - KM PSP Warszawa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b1120;
            --bg-card: #151f32;
            --bg-input: #0e1726;
            --bg-subcard: #1c2a43;
            --border-color: rgba(255, 255, 255, 0.1);
            --border-focus: #ef4444;
            --primary-red: #dc2626;
            --primary-red-hover: #b91c1c;
            --accent-glow: rgba(220, 38, 38, 0.35);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-placeholder: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(220, 38, 38, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(30, 58, 138, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
        }

        .header-container {
            text-align: center;
            margin-bottom: 35px;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #fca5a5;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .form-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 5px solid var(--primary-red);
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-icon {
            font-size: 1.4rem;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.25rem;
            color: #ffffff;
            letter-spacing: -0.3px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 640px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .field {
            margin-bottom: 18px;
        }

        .field:last-child {
            margin-bottom: 0;
        }

        .field label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 0.88rem;
            margin-bottom: 8px;
            color: #e2e8f0;
        }

        .field input, .field select, .field textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            background-color: var(--bg-input);
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .field select option {
            background-color: var(--bg-card);
            color: var(--text-main);
        }

        .field input::placeholder, .field textarea::placeholder {
            color: var(--text-placeholder);
        }

        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background-color: #111a2e;
        }

        .field select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .field textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.5;
        }

        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .zastep-box {
            background-color: var(--bg-subcard);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 18px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .zastep-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .zastep-title {
            font-weight: 700;
            font-size: 1.05rem;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-remove {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-remove:hover {
            background: rgba(239, 68, 68, 0.3);
            color: #ffffff;
            border-color: var(--primary-red);
        }

        .btn-add {
            background: rgba(255, 255, 255, 0.05);
            color: #f1f5f9;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.92rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            color: #ffffff;
        }

        .btn-submit-container {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 40px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.4);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(220, 38, 38, 0.6);
            background: linear-gradient(135deg, #f87171 0%, #dc2626 100%);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #status-msg {
            text-align: center;
            margin-top: 16px;
            font-weight: 600;
            font-size: 1rem;
            min-height: 24px;
        }

        .status-success {
            color: #4ade80;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.2);
        }

        .status-error {
            color: #f87171;
            text-shadow: 0 0 10px rgba(248, 113, 113, 0.2);
        }

        .status-sending {
            color: #38bdf8;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-badge">🚒 Państwowa Straż Pożarna</div>
        <h1>Raport</h1>
    </div>

    <form id="reportForm" class="form-container">
        <!-- Sekcja 1: Podstawowe informacje -->
        <div class="card">
            <div class="card-header">
                <span class="card-icon">📌</span>
                <span class="card-title">Informacje Podstawowe</span>
            </div>
            
            <div class="field">
                <label>Kierujący działaniami</label>
                <input type="text" id="kdr" placeholder="np. Gracii Leonard - [NadBryg] KG PSP Warszawa">
            </div>

            <div class="field">
                <label>Wypełnianie KZ z uprawnienia</label>
                <select id="uprawnienie">
                    <option value="">-- Wybierz opcjonalnie --</option>
                    <option value="Dowódca Zastępu">Dowódca Zastępu</option>
                    <option value="Kierujący Działaniami Ratowniczymi">Kierujący Działaniami Ratowniczymi</option>
                </select>
            </div>

            <div class="grid-2">
                <div class="field">
                    <label>Kategoria zdarzenia</label>
                    <select id="kategoria">
                        <option value="">-- Wybierz kategorię --</option>
                        <option value="Pożar">Pożar</option>
                        <option value="MZ - Miejscowe Zagrożenie">MZ - Miejscowe Zagrożenie</option>
                        <option value="AF - Alarm Fałszywy">AF - Alarm Fałszywy</option>
                    </select>
                </div>
                <div class="field">
                    <label id="label-wielkosc">Wielkość / Rodzaj zdarzenia</label>
                    <select id="wielkosc" disabled>
                        <option value="">-- Najpierw wybierz kategorię --</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Sekcja 2: Obsada Zastępów -->
        <div class="card">
            <div class="card-header">
                <span class="card-icon">🧑‍🚒</span>
                <span class="card-title">Obsada zastępów PSP</span>
            </div>
            
            <div id="zastepy-container">
                <!-- Dynamicznie dodawane zastępy -->
            </div>

            <button type="button" class="btn-add" onclick="addZastep()">
                <span>➕</span> Dodaj kolejny zastęp
            </button>
        </div>

        <!-- Sekcja 3: Szczegóły akcji -->
        <div class="card">
            <div class="card-header">
                <span class="card-icon">📝</span>
                <span class="card-title">Szczegóły i Przebieg Akcji</span>
            </div>

            <div class="field">
                <label>Zadysponowane SiŚ</label>
                <input type="text" id="sis" placeholder="np. WF 301-21, 301-51">
            </div>

            <div class="grid-2">
                <div class="field">
                    <label>Godzina przybycia</label>
                    <input type="time" id="godzina_przybycia">
                </div>
                <div class="field">
                    <label>Godzina zakończenia</label>
                    <input type="time" id="godzina_zakonczenia">
                </div>
            </div>

            <div class="field">
                <label>Lokalizacja zdarzenia</label>
                <input type="text" id="lokalizacja" placeholder="np. Warszawa, ul. Bitwy Warszawskiej 1920 r.">
            </div>

            <div class="field">
                <label>Opis zdarzenia</label>
                <textarea id="opis" placeholder="Opisz stan faktyczny po przybyciu oraz podjęte działania ratownicze..."></textarea>
            </div>

            <div class="field">
                <label>Sporządzający raport</label>
                <input type="text" id="sporzadzajacy" placeholder="np. Gracii Leonard - [NadBryg.] KG PSP Warszawa">
            </div>
        </div>

        <!-- Przycisk wysyłania -->
        <div class="btn-submit-container">
            <button type="submit" id="submitBtn" class="btn-submit">
                <span>🚀</span> Wyślij raport na Discorda
            </button>
            <div id="status-msg"></div>
        </div>
    </form>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1529522413988085923/a5UQzsWkWak_Sil5RaelCEgcc5mXIrKwZSp-_dgtPzxnxLePiCdltyeLOWHybLCMk9YZ";
        let zastepCounter = 0;

        // Pomocnicza funkcja: jeśli wartość jest pusta lub zawiera tylko spacje, zwraca "Brak"
        function formatValue(val) {
            return (val && val.trim() !== "") ? val.trim() : "Brak";
        }

        // Opcje wielkości zależne od kategorii zdarzenia
        const wielkoscOptions = {
            "Pożar": [
                "Mały",
                "Średni",
                "Duży",
                "Bardzo Duży"
            ],
            "MZ - Miejscowe Zagrożenie": [
                "Lokalne",
                "Małe",
                "Średnie",
                "Duże",
                "Bardzo Duże"
            ],
            "AF - Alarm Fałszywy": [
                "W dobrej wierze",
                "Złośliwy",
                "Z instalacji wykrywania"
            ]
        };

        const kategoriaSelect = document.getElementById('kategoria');
        const wielkoscSelect = document.getElementById('wielkosc');

        kategoriaSelect.addEventListener('change', function() {
            const selectedCat = this.value;
            wielkoscSelect.innerHTML = '';

            if (selectedCat && wielkoscOptions[selectedCat]) {
                wielkoscSelect.disabled = false;
                
                const defaultOpt = document.createElement('option');
                defaultOpt.value = '';
                defaultOpt.textContent = '-- Wybierz opcję --';
                wielkoscSelect.appendChild(defaultOpt);

                wielkoscOptions[selectedCat].forEach(optionText => {
                    const opt = document.createElement('option');
                    opt.value = optionText;
                    opt.textContent = optionText;
                    wielkoscSelect.appendChild(opt);
                });
            } else {
                wielkoscSelect.disabled = true;
                const defaultOpt = document.createElement('option');
                defaultOpt.value = '';
                defaultOpt.textContent = '-- Najpierw wybierz kategorię --';
                wielkoscSelect.appendChild(defaultOpt);
            }
        });

        function addZastep() {
            zastepCounter++;
            const container = document.getElementById('zastepy-container');
            
            const zastepDiv = document.createElement('div');
            zastepDiv.className = 'zastep-box';
            zastepDiv.id = `zastep-${zastepCounter}`;

            const canRemove = container.children.length > 0;

            zastepDiv.innerHTML = `
                <div class="zastep-header">
                    <div class="zastep-title">
                        <span>🚒</span> Zastęp ${container.children.length + 1}
                    </div>
                    ${canRemove ? `<button type="button" class="btn-remove" onclick="removeZastep('${zastepDiv.id}')">Usuń zastęp</button>` : ''}
                </div>
                <div class="field">
                    <label>Pojazd</label>
                    <input type="text" class="z-pojazd" placeholder="np. 401-51">
                </div>
                <div class="grid-2">
                    <div class="field">
                        <label>Kierowca</label>
                        <input type="text" class="z-kierowca" placeholder="Nazwisko Imie [Stopień] Jednostka">
                    </div>
                    <div class="field">
                        <label>Dowódca</label>
                        <input type="text" class="z-dowodca" placeholder="Nazwisko Imie [Stopień] Jednostka">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="field">
                        <label>R1</label>
                        <input type="text" class="z-r1">
                    </div>
                    <div class="field">
                        <label>Pomocnik R1</label>
                        <input type="text" class="z-pom-r1">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="field">
                        <label>R2</label>
                        <input type="text" class="z-r2">
                    </div>
                    <div class="field">
                        <label>Pomocnik R2</label>
                        <input type="text" class="z-pom-r2">
                    </div>
                </div>
            `;
            container.appendChild(zastepDiv);
            reindexZastepy();
        }

        function removeZastep(id) {
            const el = document.getElementById(id);
            if (el) {
                el.remove();
                reindexZastepy();
            }
        }

        function reindexZastepy() {
            const boxes = document.querySelectorAll('.zastep-box');
            boxes.forEach((box, index) => {
                const title = box.querySelector('.zastep-title');
                if (title) {
                    title.innerHTML = `<span>🚒</span> Zastęp ${index + 1}`;
                }
            });
        }

        // Dodaj domyślnie 1 zastęp na start
        addZastep();

        document.getElementById('reportForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const statusMsg = document.getElementById('status-msg');
            const submitBtn = document.getElementById('submitBtn');

            statusMsg.className = 'status-sending';
            statusMsg.innerText = '⏳ Wysyłanie raportu na Discorda...';
            submitBtn.disabled = true;

            const kdr = formatValue(document.getElementById('kdr').value);
            const uprawnienie = formatValue(document.getElementById('uprawnienie').value);
            const kategoria = formatValue(document.getElementById('kategoria').value);
            const wielkosc = formatValue(document.getElementById('wielkosc').value);
            const sis = formatValue(document.getElementById('sis').value);
            const przybycie = formatValue(document.getElementById('godzina_przybycia').value);
            const zakonczenie = formatValue(document.getElementById('godzina_zakonczenia').value);
            const lokalizacja = formatValue(document.getElementById('lokalizacja').value);
            const opis = formatValue(document.getElementById('opis').value);
            const sporzadzajacy = formatValue(document.getElementById('sporzadzajacy').value);

            // Budowanie tekstu dla zastępów
            let zastepyText = "";
            const zastepyBoxes = document.querySelectorAll('.zastep-box');

            zastepyBoxes.forEach((box, index) => {
                const getVal = (cls) => {
                    const inp = box.querySelector(cls);
                    return inp ? formatValue(inp.value) : "Brak";
                };

                zastepyText += `🚒 **Zastęp ${index + 1}**\n`;
                zastepyText += `Pojazd: ${getVal('.z-pojazd')}\n`;
                zastepyText += `Kierowca: ${getVal('.z-kierowca')}\n`;
                zastepyText += `Dowódca: ${getVal('.z-dowodca')}\n`;
                zastepyText += `R1: ${getVal('.z-r1')}\n`;
                zastepyText += `Pomocnik R1: ${getVal('.z-pom-r1')}\n`;
                zastepyText += `R2: ${getVal('.z-r2')}\n`;
                zastepyText += `Pomocnik R2: ${getVal('.z-pom-r2')}\n\n`;
            });

            // Sformatuj godzinę do stopki (np. "Dziś o 18:34")
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const footerText = `Dziś o ${hours}:${minutes}`;

            let description = 
                `🔴 **Kierujący działaniami**\n${kdr}\n\n` +
                `📑 **Uprawnienie**\n${uprawnienie}\n\n` +
                `📁 **Kategoria**\n${kategoria}\n\n` +
                `📏 **Wielkość**\n${wielkosc}\n\n` +
                `👤 **Obsada PSP**\n${zastepyText}` +
                `📍 **Lokalizacja**\n${lokalizacja}\n\n` +
                `⏱️ **Przybycie**\n${przybycie}\n\n` +
                `⏱️ **Zakończenie**\n${zakonczenie}\n\n` +
                `🚒 **SiŚ**\n${sis}\n\n` +
                `📝 **Opis**\n${opis}\n\n` +
                `✍️ **Sporządzający**\n${sporzadzajacy}`;

            const payload = {
                embeds: [
                    {
                        title: "📋 Karta Zdarzenia",
                        color: 3447003,
                        description: description,
                        footer: {
                            text: footerText
                        }
                    }
                ]
            };

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusMsg.className = 'status-success';
                    statusMsg.innerText = '✅ Raport został pomyślnie wysłany na Discorda!';
                } else {
                    statusMsg.className = 'status-error';
                    statusMsg.innerText = `❌ Błąd wysyłania (Kod HTTP: ${response.status})`;
                }
            } catch (err) {
                statusMsg.className = 'status-error';
                statusMsg.innerText = '❌ Wystąpił błąd połączenia z serwerem Discorda.';
                console.error(err);
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
